<style>
  :root {
    --bg: #060608; --surface: #0e0e12; --surface2: #14141a;
    --border: #1c1c26; --border-hover: #2a2a38;
    --text: #e8e6f0; --text-dim: #7a7890; --text-muted: #4a4860;
    --accent: #a8ff78; --accent-dim: #a8ff7822; --accent-mid: #a8ff7844;
    --danger: #ff5c5c; --danger-dim: #ff5c5c22;
    --radius: 10px; --radius-lg: 14px;
    --font: 'Outfit', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:10px}
  .nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
  .nav-brand{display:flex;align-items:baseline;gap:10px}
  .nav-logo{font-family:var(--mono);font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.06em}
  .nav-sub{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:0.12em;text-transform:uppercase}
  .nav-tabs{display:flex;gap:2px;background:var(--surface);border-radius:8px;padding:3px;border:1px solid var(--border)}
  .nav-tab{padding:7px 16px;border-radius:6px;border:none;background:transparent;color:var(--text-dim);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
  .nav-tab:hover{color:var(--text)}.nav-tab.active{background:var(--surface2);color:var(--accent);font-weight:600}
  .nav-tab .badge{background:var(--accent-dim);color:var(--accent);padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;font-family:var(--mono)}
  .hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer}
  .mobile-menu{display:none;position:fixed;top:56px;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);z-index:99;padding:8px}

  @media(max-width:640px){.nav-tabs{display:none}.hamburger{display:block}}

  .card-title{font-size:15px;font-weight:600;margin-bottom:4px}
  .card-sub{font-size:12px;color:var(--text-muted);margin-bottom:16px}
  .field{margin-bottom:14px}.field-row{display:grid;gap:12px;margin-bottom:14px}
  .field-row-2{grid-template-columns:1fr 1fr}.field-row-3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:500px){.field-row-3,.field-row-2{grid-template-columns:1fr}}
  label.lbl{display:block;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
  input.inp,textarea.inp,select.inp{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:14px;transition:border-color .2s}
  input.inp:focus,textarea.inp:focus,select.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  textarea.inp{resize:vertical;min-height:160px;line-height:1.6}select.inp{cursor:pointer}
  .char-count{font-size:11px;color:var(--text-muted);font-family:var(--mono);margin-top:4px}
  .check-row{display:flex;gap:20px;margin:14px 0;flex-wrap:wrap}

  .check-row input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
  .btn{padding:10px 20px;border-radius:var(--radius);border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
  .btn-primary{background:var(--accent);color:#080a06;font-weight:700}
  .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-ghost{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--border-hover);color:var(--text)}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .btn-danger:hover{background:var(--danger-dim)}
  .btn-full{width:100%;justify-content:center}.btn-lg{padding:14px 24px;font-size:15px;border-radius:12px}
  .btn-ai{width:100%;padding:16px;border-radius:12px;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#a8ff78 0%,#78ffd6 100%);color:#060608;letter-spacing:-0.01em;box-shadow:0 4px 24px #a8ff7833;margin-bottom:16px}
  .btn-ai:hover{transform:translateY(-2px);box-shadow:0 8px 32px #a8ff7844}
  .btn-ai:disabled{background:var(--surface2);color:var(--text-muted);box-shadow:none;cursor:wait;transform:none}

  .img-add{aspect-ratio:1;border-radius:var(--radius);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--text-muted);gap:4px}

  .listing-thumb{width:60px;height:60px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--surface2)}
  .listing-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .listing-info{flex:1;min-width:0}
  .listing-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
  .listing-meta{font-size:11px;color:var(--text-muted);display:flex;gap:8px;flex-wrap:wrap}
  .listing-actions{display:flex;gap:6px;flex-shrink:0}
  .listing-actions button{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s}
  .listing-actions button:hover{border-color:var(--border-hover);color:var(--text)}
  .listing-actions .del-btn{color:var(--danger)}.listing-actions .del-btn:hover{background:var(--danger-dim)}
  .select-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px;background:transparent}
  .select-box.checked{border-color:var(--accent);background:var(--accent)}
  .select-box.checked::after{content:'\2713';color:#060608;font-size:13px;font-weight:800}
  .empty-state{text-align:center;padding:60px 20px}
  .empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.2}
  .empty-state h3{font-size:18px;font-weight:600;margin-bottom:8px}
  .empty-state p{color:var(--text-muted);font-size:14px}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:var(--radius);font-size:13px;font-weight:700;z-index:1000;animation:toastIn .25s ease;font-family:var(--font);background:var(--accent);color:#060608;box-shadow:0 8px 24px #a8ff7844}
  .toast.error{background:var(--danger);color:#fff;box-shadow:0 8px 24px #ff5c5c44}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .page-header h1{font-size:26px;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px}
  .page-header p{color:var(--text-muted);font-size:13px}.page-header{margin-bottom:24px}
  .info-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-top:24px}
  .info-box h4{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text-dim)}
  .info-box p{font-size:12px;color:var(--text-muted);line-height:1.8}
  .review-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .review-bar .actions{display:flex;gap:8px;flex-wrap:wrap}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
  body>*{position:relative;z-index:1}
</style>

const AI_SYSTEM=`You are a vintage clothing listing generator for Depop and Vinted resale platforms. Follow these rules EXACTLY:

TITLE FORMAT: Vintage + Era (Y2K or 1990s) + Brand + Key Feature + Item Type. Capitalise all major words. 40-65 characters. Keywords: Embroidered Logo, Quarter Zip, Three Stripe, Athletic Dept, Heavyweight, Boxy, Crewneck, Hoodie, Sweatshirt

DESCRIPTION template:
**[Title]**

[One paragraph: trendy, streetwear-oriented, casual but descriptive. Highlight era, style, fit, branding, streetwear appeal. Use phrases like: Classic Y2K, Clean colourway, Early-2000s sportswear aesthetic, Retro gymwear, Streetwear layering piece, Relaxed boxy vintage fit, Soft fleece-lined interior, Iconic embroidered logo]

**Size** – Men's [Size] (see exact measurements in photos)

**Colour** – [Colour]

**Condition** – [Condition description]

#[hashtag1] #[hashtag2] #[hashtag3] #[hashtag4] #[hashtag5]

RULES: Bold title in description. Use dash not colon. ONE paragraph only. Exactly 5 hashtags. Include Y2K. Simple colours. Always include "(see exact measurements in photos)".

Respond ONLY with valid JSON, no markdown fences:
{"title":"title without bold","description":"FULL description with bold markers size colour condition hashtags","hashtags":["t1","t2","t3","t4","t5"],"suggestedColor":"from allowed list","suggestedSecondaryColor":"or empty string","suggestedSize":"XS or S or M or L or XL or XXL or XXXL","suggestedCategory":"sweatshirt or hoodie or quarter_zip or track_top or fleece or t_shirt or jacket or jersey or joggers","suggestedCondition":"NewWithTags or NewWithoutTags or VeryGood or Good or Fair or Poor","suggestedEra":"From2000To2006 or From1990s or From2007To2009"}`;

// ── STATE ──
let S = {
  page: 'create', listings: [], editingId: null, menuOpen: false,
  images: [],  // Each: { name, dataUrl, apiB64, apiMime }
  generating: false,
  form: null, toast: null, toastType: 'success', toastTimer: null,
  settings: { apiKey:'', defaultPrice:'25.00', defaultShippingWeight:'500', defaultShippingWeightUnit:'Grams' }
};

// In-memory cache (loaded from IndexedDB on startup)
// Keyed by listing ID -> array of { name, dataUrl }
var imageStore = {};

// ── IndexedDB for image persistence ──
var idb = null;
function openIDB() {
  return new Promise(function(resolve, reject) {
    if (idb) { resolve(idb); return; }
    var req = indexedDB.open('vlst_images', 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('images')) {
        db.createObjectStore('images');
      }
    };
    req.onsuccess = function(e) { idb = e.target.result; resolve(idb); };
    req.onerror = function(e) { console.warn('IndexedDB open failed:', e); resolve(null); };
  });
}

async function idbSaveImages(listingId, imagesArray) {
  imageStore[listingId] = imagesArray;
  try {
    var db = await openIDB();
    if (!db) return;
    var tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').put(imagesArray, listingId);
  } catch(e) { console.warn('IDB save failed:', e); }
}

async function idbLoadImages(listingId) {
  if (imageStore[listingId]) return imageStore[listingId];
  try {
    var db = await openIDB();
    if (!db) return null;
    return new Promise(function(resolve) {
      var tx = db.transaction('images', 'readonly');
      var req = tx.objectStore('images').get(listingId);
      req.onsuccess = function() {
        var result = req.result || null;
        if (result) imageStore[listingId] = result;
        resolve(result);
      };
      req.onerror = function() { resolve(null); };
    });
  } catch(e) { return null; }
}

async function idbDeleteImages(listingId) {
  delete imageStore[listingId];
  try {
    var db = await openIDB();
    if (!db) return;
    var tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').delete(listingId);
  } catch(e) { console.warn('IDB delete failed:', e); }
}

async function idbClearAll() {
  imageStore = {};
  try {
    var db = await openIDB();
    if (!db) return;
    var tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').clear();
  } catch(e) { console.warn('IDB clear failed:', e); }
}

// Load all images from IndexedDB into memory cache on startup
async function idbLoadAll() {
  try {
    var db = await openIDB();
    if (!db) return;
    return new Promise(function(resolve) {
      var tx = db.transaction('images', 'readonly');
      var store = tx.objectStore('images');
      var req = store.openCursor();
      req.onsuccess = function(e) {
        var cursor = e.target.result;
        if (cursor) {
          imageStore[cursor.key] = cursor.value;
          cursor.continue();
        } else {
          console.log('Loaded images for', Object.keys(imageStore).length, 'listings from IndexedDB');
          resolve();
        }
      };
      req.onerror = function() { resolve(); };
    });
  } catch(e) { console.warn('IDB load all failed:', e); }
}

}

// ── PERSISTENCE ──
function saveLS() {
  try {
    // Don't save full images in listings — just thumbs
    const slim = S.listings.map(function(l) {
      var copy = {};
      for (var k in l) { if (k !== '_imgFull') copy[k] = l[k]; }
      return copy;
    });
    localStorage.setItem('vlst_listings', JSON.stringify(slim));

/**
 * Detect if a file is HEIC/HEIF format.
 * Checks MIME type, file extension, and uses heic-to's detection if available.
 */
function isHeicFile(file) {
  var type = (file.type || '').toLowerCase();
  var name = (file.name || '').toLowerCase();
  return type === 'image/heic' || type === 'image/heif' ||
         type === '' && (name.endsWith('.heic') || name.endsWith('.heif')) ||
         name.endsWith('.heic') || name.endsWith('.heif');
}

/**
 * Convert any image file to a JPEG base64 data URL.
 * Handles: HEIC, HEIF, WEBP, PNG, TIFF, BMP, GIF, JPG — everything.
 * HEIC/HEIF files are first converted via heic-to library.
 * All others go through canvas for guaranteed JPEG output.
 * Also resizes to max 1024px for the API payload.
 * Returns: { dataUrl, apiB64, apiMime }
 */
async function processImage(file) {
  var blobToProcess = file;

  // Step 1: If HEIC/HEIF, convert to JPEG blob first
  if (isHeicFile(file)) {
    console.log('HEIC file detected:', file.name, 'type:', file.type, 'size:', file.size);

    // Try heic-to library (IIFE global = HeicTo)
    if (typeof HeicTo !== 'undefined') {
      try {
        console.log('Attempting HeicTo conversion...');
        // The IIFE build exposes HeicTo as a callable function directly
        var converted = await HeicTo({ blob: file, type: 'image/jpeg', quality: 0.85 });
        if (converted && converted.size > 0) {
          blobToProcess = converted;
          console.log('HeicTo conversion succeeded, blob size:', blobToProcess.size);
        } else {
          throw new Error('Empty result from HeicTo');
        }
      } catch (err1) {
        console.warn('HeicTo() direct call failed:', err1.message);
        // Fallback: try as HeicTo.heicTo() in case API differs
        try {
          if (typeof HeicTo.heicTo === 'function') {
            console.log('Trying HeicTo.heicTo() fallback...');
            var converted2 = await HeicTo.heicTo({ blob: file, type: 'image/jpeg', quality: 0.85 });
            if (converted2 && converted2.size > 0) {
              blobToProcess = converted2;
              console.log('HeicTo.heicTo() fallback succeeded');
            } else {
              throw new Error('Empty result');
            }
          } else {
            throw new Error('HeicTo.heicTo is not a function');
          }
        } catch (err2) {
          console.warn('HeicTo.heicTo() also failed:', err2.message);
          // Fallback: try heic2any if it exists
          if (typeof heic2any !== 'undefined') {
            try {
              console.log('Trying heic2any fallback...');
              var converted3 = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
              blobToProcess = Array.isArray(converted3) ? converted3[0] : converted3;
              console.log('heic2any fallback succeeded');
            } catch (err3) {
              console.error('All HEIC converters failed');
              throw new Error('Could not convert ' + file.name + '. Please convert to JPG using your phone settings or an online converter before uploading.');
            }
          } else {
            throw new Error('Could not convert ' + file.name + '. Please convert to JPG using your phone settings or an online converter before uploading.');
          }
        }
      }
    } else {
      throw new Error('HEIC converter not loaded. Please convert ' + file.name + ' to JPG before uploading.');
    }
  }

  // Step 2: Load blob into Image via object URL, draw to canvas, export JPEG
  return new Promise(function(resolve, reject) {
    var url = URL.createObjectURL(blobToProcess);
    var img = new Image();
    img.onload = function() {
      URL.revokeObjectURL(url);
      var MAX = 1024;
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var jpegDataUrl = canvas.toDataURL('image/jpeg', 0.85);
      var apiB64 = jpegDataUrl.split(',')[1];
      resolve({ dataUrl: jpegDataUrl, apiB64: apiB64, apiMime: 'image/jpeg' });
    };
    img.onerror = function() {
      URL.revokeObjectURL(url);
      reject(new Error('Failed to load image: ' + file.name));
    };
    img.src = url;
  });
}

// Also make a small thumbnail for saving in localStorage
function makeThumb(dataUrl) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var s = 120;
      var w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * s / w); w = s; }
      else { w = Math.round(w * s / h); h = s; }
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.6));
    };
    img.onerror = function() { resolve(null); };
    img.src = dataUrl;
  });
}

    if (a === 'backToList') el.onclick = function() { S.editingId = null; render(); };
    if (a === 'exportCSV') el.onclick = expCSV;
    if (a === 'saveApiKey') el.onclick = function() { S.settings.apiKey = (document.getElementById('apiKeyInput')||{}).value||''; saveSS(); toast('API key saved!'); };
    if (a === 'toggleKeyVis') el.onclick = function() { var inp = document.getElementById('apiKeyInput'); if(inp){inp.type=inp.type==='password'?'text':'password';el.textContent=inp.type==='password'?'Show':'Hide';} };
    if (a === 'saveDefaults') el.onclick = function() { S.settings.defaultPrice=(document.getElementById('defPrice')||{}).value||'25.00'; S.settings.defaultShippingWeight=(document.getElementById('defWeight')||{}).value||'500'; S.settings.defaultShippingWeightUnit=(document.getElementById('defWeightUnit')||{}).value||'Grams'; saveSS(); toast('Defaults saved!'); };
    if (a === 'clearAll') el.onclick = function() { if(confirm('Delete ALL listings? Cannot undo.')){S.listings=[];idbClearAll();saveLS();render();toast('All listings cleared');} };
  });

  var fi = document.getElementById('fileInput');
  if (fi) fi.onchange = handleFiles;

  // Create page field bindings
  document.querySelectorAll('[data-field]').forEach(function(el) {
    el.addEventListener(el.tagName==='SELECT'?'change':'input', function() { S.form[el.dataset.field] = el.value; });
  });
  document.querySelectorAll('[data-check]').forEach(function(el) {
    el.onchange = function() { S.form[el.dataset.check] = el.checked; };
  });

  // Edit page field bindings
  document.querySelectorAll('[data-edit]').forEach(function(el) {
    el.addEventListener(el.tagName==='SELECT'?'change':'input', function() {
      var it = S.listings.find(function(l){return l.id===S.editingId;});
      if (it) { it[el.dataset.edit] = el.value; saveLS(); }
    });
  });
  document.querySelectorAll('[data-editcheck]').forEach(function(el) {
    el.onchange = function() {
      var it = S.listings.find(function(l){return l.id===S.editingId;});
      if (it) { it[el.dataset.editcheck] = el.checked; saveLS(); }
    };
  });
}

// ── FILE UPLOAD ──
async function handleFiles(e) {
  var files = Array.from(e.target.files).slice(0, 8 - S.images.length);
  for (var i = 0; i < files.length; i++) {
    if (S.images.length >= 8) break;
    try {
      // Show feedback for HEIC conversion (takes a moment)
      if (isHeicFile(files[i])) {
        toast('Converting ' + files[i].name + '...');
      }
      var result = await processImage(files[i]);
      // Rename HEIC files to .jpg for Crosslist compatibility
      var name = files[i].name;
      if (isHeicFile(files[i])) {
        name = name.replace(/\.heic$/i, '.jpg').replace(/\.heif$/i, '.jpg');
      }
      S.images.push({
        name: name,
        dataUrl: result.dataUrl,
        apiB64: result.apiB64,
        apiMime: result.apiMime
      });
      // Render after each image so user sees progress
      render();
    } catch (err) {
      console.error('Image process error:', err);
      toast('Failed to load: ' + files[i].name + ' — ' + err.message, 'error');
    }
  }
  e.target.value = '';
  render();
}

// ── AI GENERATION ──
async function genAI() {
  if (!S.settings.apiKey) { toast('Add your API key in Settings first', 'error'); return; }
  if (!S.images.length) { toast('Upload at least one image', 'error'); return; }

  S.generating = true;
  render();

  try {
    // Send up to 4 images
    var imgPayload = S.images.slice(0, 4).map(function(img) {
      return {
        type: "image",
        source: {
          type: "base64",
          media_type: img.apiMime,
          data: img.apiB64
        }
      };
    });

    var body = {
      model: "claude-sonnet-4-20250514",
      max_tokens: 1500,
      system: AI_SYSTEM,
      messages: [{
        role: "user",
        content: imgPayload.concat([{
          type: "text",
          text: "Analyze these images of a vintage clothing item. Generate a complete listing following the system rules. Return ONLY valid JSON, no markdown fences or extra text."
        }])
      }]
    };

    console.log('Sending API request with', imgPayload.length, 'images');

    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": S.settings.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify(body)
    });

    var data = await res.json();
    console.log('API response:', data);

    if (data.error) {
      toast('API Error: ' + (data.error.message || JSON.stringify(data.error)), 'error');
      S.generating = false;
      render();
      return;
    }

    var textBlock = (data.content || []).find(function(c) { return c.type === 'text'; });
    if (!textBlock) {
      toast('No text in API response', 'error');
      S.generating = false;
      render();
      return;
    }

    var txt = textBlock.text;
    var clean = txt.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    console.log('Cleaned response:', clean);

    var p = JSON.parse(clean);
    var brand = '';
    if (p.title) {
      var m = p.title.match(/Vintage\s+(?:Y2K|1990s)\s+(\S+)/i);
      if (m) brand = m[1];
    }

    S.form.title = p.title || S.form.title;
    S.form.description = p.description || S.form.description;
    S.form.brand = brand || S.form.brand;
    S.form.hashtags = (p.hashtags || []).join(', ');
    S.form.color = p.suggestedColor || S.form.color;
    S.form.secondaryColor = p.suggestedSecondaryColor || '';
    S.form.sizeId = SIZE_MAP[p.suggestedSize] || S.form.sizeId;
    S.form.categoryId = CAT_MAP[p.suggestedCategory] || S.form.categoryId;
    S.form.condition = p.suggestedCondition || S.form.condition;
    S.form.whenMade = p.suggestedEra || S.form.whenMade;

    toast('AI listing generated!');
  } catch (err) {
    console.error('Generation error:', err);
    toast('Failed: ' + err.message, 'error');
  }

  S.generating = false;
  render();
}

// ── SAVE LISTING ──
async function doSaveListing() {
  var f = S.form;
  if (!f.title) { toast('Title is required', 'error'); return; }
  if (!f.price) { toast('Price is required', 'error'); return; }

  // Make a small thumbnail for the review list
  var thumbData = null;
  if (S.images.length > 0) {
    try {
      thumbData = await makeThumb(S.images[0].dataUrl);
    } catch(e) { thumbData = null; }
  }

  // Generate a listing ID
  var listingId = uid();

  // Create clean sequential image filenames and store full data in memory
  var imageNames = [];
  var imageDataForStore = [];
  var slugBase = (f.brand || 'item').toLowerCase().replace(/[^a-z0-9]/g, '') + '-' + listingId.slice(0, 6);
  for (var i = 0; i < S.images.length; i++) {
    var cleanName = slugBase + '-' + (i + 1) + '.jpg';
    imageNames.push(cleanName);
    imageDataForStore.push({ name: cleanName, dataUrl: S.images[i].dataUrl });
  }

  // Store full image data in IndexedDB (survives refresh)
  await idbSaveImages(listingId, imageDataForStore);

  var listing = {};
  for (var k in f) listing[k] = f[k];
  listing.id = listingId;
  listing.selected = false;
  listing.createdAt = Date.now();
  listing.imageNames = imageNames;
  listing.thumbData = thumbData;

  S.listings.push(listing);
  saveLS();

  // Reset
  S.images = [];
  S.form = defForm();
  toast('Listing created!');
  S.page = 'review';
  render();
  window.scrollTo(0, 0);
}

// ── EXPORT CSV + IMAGES ZIP ──
async function expCSV() {
  var sel = S.listings.filter(function(l) { return l.selected; });
  if (!sel.length) { toast('Select listings to export', 'error'); return; }

  // Ensure images are loaded from IndexedDB for all selected listings
  toast('Preparing export...');
  for (var si = 0; si < sel.length; si++) {
    if (!imageStore[sel[si].id]) {
      await idbLoadImages(sel[si].id);
    }
  }

  var hasImages = sel.some(function(l) { return imageStore[l.id] && imageStore[l.id].length > 0; });

  var h = ["Id","Title","Description","Price","Original Price","Brand","Category id","Size id","Condition","Color","Secondary color","Images","Quantity","Shipping weight","Shipping weight unit","Shipping height","Shipping width","Shipping length","Domestic shipping price","Worldwide shipping price","Free domestic shipping","Free worldwide shipping","Tags","SKU","Who made","When made","Smart pricing","Smart pricing price","Accept offers","Is auction","Auction starting price","Internal note"];

  var rows = sel.map(function(l) {
    var tags = (l.hashtags||'').split(',').map(function(t){return t.trim().replace(/^#/,'');}).filter(Boolean).join('|');
    var imgs = (l.imageNames||[]).join('|');
    return ['',l.title,l.description,l.price,l.originalPrice||'',l.brand,l.categoryId,l.sizeId,l.condition,l.color,l.secondaryColor||'',imgs,'1',l.shippingWeight||'',l.shippingWeightUnit||'Grams',l.shippingHeight||'',l.shippingWidth||'',l.shippingLength||'','','',l.freeShipping?'TRUE':'FALSE','FALSE',tags,'',l.whoMade||'SomeoneElse',l.whenMade||'From2000To2006','FALSE','',l.acceptOffers?'TRUE':'FALSE','FALSE','',l.internalNote||''].map(csvE).join(',');
  });

  var csv = [h.join(',')].concat(rows).join('\r\n');
  var datestamp = new Date().toISOString().slice(0,10);

  // 1. Always download the CSV
  var csvBlob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var csvUrl = URL.createObjectURL(csvBlob);
  var csvLink = document.createElement('a');
  csvLink.href = csvUrl;
  csvLink.download = 'crosslist-listings-' + datestamp + '.csv';
  document.body.appendChild(csvLink); csvLink.click(); document.body.removeChild(csvLink);
  URL.revokeObjectURL(csvUrl);

  // 2. Build and download a separate ZIP of just the images
  if (hasImages && typeof JSZip !== 'undefined') {
    toast('Building images ZIP...');
    try {
      var zip = new JSZip();
      var imgCount = 0;

      sel.forEach(function(l) {
        var imgs = imageStore[l.id];
        if (imgs) {
          imgs.forEach(function(img) {
            var b64 = img.dataUrl.split(',')[1];
            zip.file(img.name, b64, { base64: true });
            imgCount++;
          });
        }
      });

      if (imgCount > 0) {
        var zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
        // Small delay so browser handles both downloads
        await new Promise(function(r) { setTimeout(r, 500); });
        var zipUrl = URL.createObjectURL(zipBlob);
        var zipLink = document.createElement('a');
        zipLink.href = zipUrl;
        zipLink.download = 'crosslist-images-' + datestamp + '.zip';
        document.body.appendChild(zipLink); zipLink.click(); document.body.removeChild(zipLink);
        URL.revokeObjectURL(zipUrl);
        toast('Exported ' + sel.length + ' listing(s) — CSV + ' + imgCount + ' images ZIP!');
      } else {
        toast('Exported CSV — no images to bundle');
      }
    } catch (err) {
      console.error('ZIP creation failed:', err);
      toast('CSV downloaded, but ZIP failed: ' + err.message, 'error');
    }
  } else if (!hasImages) {
    toast('Exported CSV — no images found for selected listings', 'error');
  } else {
    toast('Exported CSV — ZIP library not available', 'error');
  }
}
